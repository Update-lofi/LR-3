{% extends "base.html" %}

{% block content %}
<h2>{{ entry.title }}</h2>
<p><small>Дата: {{ entry.date }}</small></p>
<div>
    <p>{{ entry.content }}</p>
</div>

<a href="/edit/{{ entry.id }}">Редактировать</a>

<form action="/delete/{{ entry.id }}" method="POST" style="display:inline;">
    <button type="submit">Удалить</button>
</form>

<a href="/">На главную</a>
{% endblock %}
